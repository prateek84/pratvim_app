    <rect x="0" y="25" width="390" height="365" rx="46" fill="#e9f0ea" filter="url(#softShadow)"/>
    <rect x="22" y="48" width="346" height="319" rx="36" fill="#f4f7f1"/>
    <circle cx="92" cy="130" r="48" fill="#dce8dc"/>
    <circle cx="316" cy="250" r="58" fill="#e7ead7"/>
    <rect x="146" y="82" width="98" height="98" rx="24" fill="#ffffff" opacity=".92"/>
    <path d="M165 139l21 21 41-50" fill="none" stroke="#718c75" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="195" y="218" text-anchor="middle" class="brand" fill="#263528">Safe SearchAI</text>
    <text x="195" y="248" text-anchor="middle" class="body" fill="#657166">Safe voice and text chat for kids</text>
    <rect x="70" y="286" width="250" height="54" rx="27" fill="#718c75"/>
