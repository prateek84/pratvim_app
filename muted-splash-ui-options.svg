<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#233044" flood-opacity="0.12"/>
    </filter>
    <style>
      .sheet-title { font: 800 34px Inter, Arial, sans-serif; fill: #222936; }
      .sheet-copy { font: 600 16px Inter, Arial, sans-serif; fill: #697082; }
      .option-label { font: 800 18px Inter, Arial, sans-serif; fill: #242b39; }
      .option-note { font: 650 12px Inter, Arial, sans-serif; fill: #737984; letter-spacing: .02em; }
      .brand { font: 900 28px Inter, Arial, sans-serif; letter-spacing: -.02em; }
      .body { font: 700 12px Inter, Arial, sans-serif; line-height: 1.4; }
      .mini { font: 800 9px Inter, Arial, sans-serif; letter-spacing: .08em; }
      .btn { font: 900 13px Inter, Arial, sans-serif; }
      .outline { fill: none; stroke: rgba(20, 30, 45, .08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1500" height="1000" fill="#f5f3ee"/>
  <text x="70" y="70" class="sheet-title">Safe SearchAI muted splash screen UI options</text>
  <text x="70" y="102" class="sheet-copy">All options avoid bright colors and keep a kid-friendly, professional, calm visual direction.</text>

  <!-- Option 1 -->
  <g transform="translate(70,150)">
    <text x="0" y="-20" class="option-label">Option 1: Misty Sage</text>
    <text x="0" y="2" class="option-note">Best balanced: safe, soft, parent-trustworthy</text>
    <rect x="0" y="25" width="390" height="745" rx="46" fill="#f3f0e8" filter="url(#softShadow)"/>
    <rect x="22" y="48" width="346" height="699" rx="36" fill="#eaf1ec"/>
    <circle cx="88" cy="142" r="54" fill="#d9e7dd"/>
    <circle cx="316" cy="350" r="76" fill="#d4e3dd"/>
    <circle cx="55" cy="635" r="50" fill="#f5eadb"/>
    <rect x="139" y="92" width="112" height="112" rx="26" fill="#ffffff" opacity=".9"/>
    <path d="M172 151c16-25 50-25 66 0-16 25-50 25-66 0z" fill="#789185"/>
    <circle cx="205" cy="151" r="13" fill="#f8f5ef"/>
    <path d="M205 125v-14M184 136l-10-10M226 136l10-10" stroke="#789185" stroke-width="7" stroke-linecap="round"/>
    <text x="195" y="260" text-anchor="middle" class="brand" fill="#29362f">Safe SearchAI</text>
    <text x="195" y="292" text-anchor="middle" class="body" fill="#59675f">Safe voice and text chat for kids</text>
    <text x="195" y="312" text-anchor="middle" class="body" fill="#59675f">to ask, learn, and explore with confidence.</text>
    <text x="70" y="485" class="mini" fill="#6f7e75">FOR KIDS</text>
    <rect x="70" y="505" width="250" height="58" rx="29" fill="#7f978a"/>
    <text x="195" y="541" text-anchor="middle" class="btn" fill="#ffffff">Login</text>
    <text x="70" y="598" class="mini" fill="#6f7e75">FOR PARENTS</text>
    <rect x="70" y="618" width="150" height="48" rx="24" fill="#fffaf2" stroke="#d8d1c1"/>
    <text x="145" y="648" text-anchor="middle" class="btn" fill="#59675f">Register</text>
    <rect x="233" y="618" width="87" height="48" rx="24" fill="#fffaf2" stroke="#d8d1c1"/>
    <text x="276" y="648" text-anchor="middle" class="btn" fill="#59675f">Login</text>
  </g>

