    <text x="195" y="312" text-anchor="middle" class="body" fill="#625d73">to ask, learn, and explore with confidence.</text>
    <text x="70" y="485" class="mini" fill="#7a748e">FOR KIDS</text>
    <rect x="70" y="505" width="250" height="58" rx="29" fill="#8a82a9"/>
    <text x="195" y="541" text-anchor="middle" class="btn" fill="#ffffff">Login</text>
    <text x="70" y="598" class="mini" fill="#7a748e">FOR PARENTS</text>
    <rect x="70" y="618" width="150" height="48" rx="24" fill="#ffffff" stroke="#ddd7ea"/>
    <text x="145" y="648" text-anchor="middle" class="btn" fill="#625d73">Register</text>
    <rect x="233" y="618" width="87" height="48" rx="24" fill="#ffffff" stroke="#ddd7ea"/>
    <text x="276" y="648" text-anchor="middle" class="btn" fill="#625d73">Login</text>
