    <text x="195" y="260" text-anchor="middle" class="brand" fill="#312b24">Safe SearchAI</text>
    <text x="195" y="292" text-anchor="middle" class="body" fill="#6b6256">Safe voice and text chat for kids</text>
    <text x="195" y="312" text-anchor="middle" class="body" fill="#6b6256">to ask, learn, and explore with confidence.</text>
