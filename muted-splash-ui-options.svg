    <rect x="22" y="48" width="346" height="319" rx="36" fill="#f1f5f7"/>
    <circle cx="92" cy="130" r="48" fill="#dae4ed"/>
    <circle cx="316" cy="250" r="58" fill="#e6e1ec"/>
    <rect x="146" y="82" width="98" height="98" rx="24" fill="#ffffff" opacity=".92"/>
    <rect x="166" y="112" width="58" height="44" rx="17" fill="#697d91"/>
    <path d="M184 112v-8c0-12 22-12 22 0v8" stroke="#697d91" stroke-width="8" stroke-linecap="round"/>
    <circle cx="195" cy="134" r="7" fill="#f1f5f7"/>
    <text x="195" y="218" text-anchor="middle" class="brand" fill="#253140">Safe SearchAI</text>
    <text x="195" y="248" text-anchor="middle" class="body" fill="#687481">Safe voice and text chat for kids</text>
    <rect x="70" y="286" width="250" height="54" rx="27" fill="#697d91"/>
